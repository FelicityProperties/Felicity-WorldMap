<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Felicity WorldMap — Real-time global intelligence dashboard tracking macro events, market shifts, and geopolitical movements.">
  <title>Felicity WorldMap — Global Intelligence Dashboard</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/statusbar.css">
</head>
<body>

<div id="app">

  <!-- ═══════════════ TOPBAR ═══════════════ -->
  <header class="topbar">
    <div class="topbar__brand">
      <div class="topbar__logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="14.5" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
          <ellipse cx="16" cy="16" rx="8" ry="14.5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <line x1="1.5" y1="16" x2="30.5" y2="16" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>
          <line x1="4" y1="9" x2="28" y2="9" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
          <line x1="4" y1="23" x2="28" y2="23" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
        </svg>
      </div>
      <div class="topbar__title-group">
        <h1 class="topbar__title">Felicity WorldMap</h1>
        <span class="topbar__subtitle">Intelligence</span>
      </div>
    </div>

    <div class="topbar__ticker">
      <div class="topbar__ticker-track" id="ticker-track"></div>
    </div>

    <div class="topbar__status">
      <div class="live-badge">
        <span class="live-badge__dot"></span>
        LIVE
      </div>
      <time class="topbar__clock" id="clock">--:--:-- UTC</time>
    </div>
  </header>

  <!-- ═══════════════ NAVIGATION ═══════════════ -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <button class="nav-btn active" data-view="map">
      <svg class="nav-btn__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="8" cy="8" r="6.5"/><path d="M1.5 8h13M8 1.5c-2 2.5-2 11 0 13M8 1.5c2 2.5 2 11 0 13"/>
      </svg>
      <span class="nav-btn__label">World Map</span>
    </button>
    <button class="nav-btn" data-view="flights">
      <svg class="nav-btn__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 12l4-3 2 1.5L14 4M14 4v3M14 4h-3"/>
      </svg>
      <span class="nav-btn__label">Flights</span>
    </button>
    <button class="nav-btn" data-view="ships">
      <svg class="nav-btn__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 10l2-6h8l2 6M1 12c2 2 4 2 7 0s5-2 7 0M6 4V2h4v2"/>
      </svg>
      <span class="nav-btn__label">Maritime</span>
    </button>
    <button class="nav-btn" data-view="markets">
      <svg class="nav-btn__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M2 12l3-4 3 2 4-6M14 4v2.5M14 4h-2.5"/>
      </svg>
      <span class="nav-btn__label">Markets</span>
    </button>
    <button class="nav-btn" data-view="intel">
      <svg class="nav-btn__icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M8 2l1.5 3H13l-2.5 2 1 3L8 8.5 4.5 10l1-3L3 5h3.5z"/>
      </svg>
      <span class="nav-btn__label">AI Intel</span>
    </button>
  </nav>

  <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
  <main class="main">
    <!-- Map -->
    <div class="map-wrap">
      <div id="map"></div>

      <!-- Layer Controls -->
      <div class="layer-controls">
        <button class="layer-btn active" data-layer="choropleth">
          <span class="layer-btn__dot"></span>
          Instability
        </button>
        <button class="layer-btn active" data-layer="conflicts">
          <span class="layer-btn__dot"></span>
          Conflicts
        </button>
        <button class="layer-btn active" data-layer="flights">
          <span class="layer-btn__dot"></span>
          Flights
        </button>
        <button class="layer-btn active" data-layer="ships">
          <span class="layer-btn__dot"></span>
          Ships
        </button>
      </div>

      <!-- Map Legend -->
      <div class="map-legend">
        <div class="map-legend__title">CII Score</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#500010"></div>Critical 9-10</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#6b1020"></div>High 7-9</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#664400"></div>Elevated 5-7</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#0d3366"></div>Moderate 3-5</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#0a3d22"></div>Low 1-3</div>
        <div class="map-legend__row"><div class="map-legend__swatch" style="background:#141c2b"></div>No data</div>
      </div>

      <!-- Country Detail Panel -->
      <div class="country-panel" id="country-panel">
        <div class="country-panel__accent"></div>
        <div class="country-panel__header">
          <div class="country-panel__name" id="cp-name">&mdash;</div>
          <button class="country-panel__close" id="cp-close">&times;</button>
        </div>
        <div class="country-panel__meta">
          <div class="meta-item">
            <div class="meta-item__label">CII Score</div>
            <div class="meta-item__value" id="cp-cii">&mdash;</div>
          </div>
          <div class="meta-item">
            <div class="meta-item__label">Region</div>
            <div class="meta-item__value meta-item__value--neutral" id="cp-region">&mdash;</div>
          </div>
        </div>
        <div class="cii-bar">
          <div class="cii-bar__fill" id="cp-bar-fill" style="width:0%"></div>
        </div>
        <div class="country-panel__intel">
          <div class="intel-loading" id="cp-loading">Generating intelligence brief</div>
          <div class="intel-text" id="cp-intel"></div>
        </div>
        <button class="country-panel__action" id="cp-brief-btn">Full Intelligence Brief &nearr;</button>
      </div>

      <!-- Sidebar Toggle (visible on tablet/mobile) -->
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2 4h12M2 8h12M2 12h12"/>
        </svg>
      </button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" role="complementary" aria-label="Intelligence feed">
      <div class="sidebar__tabs" id="sidebar-tabs">
        <button class="stab active" data-tab="news">News</button>
        <button class="stab" data-tab="markets">Markets</button>
        <button class="stab" data-tab="flights">Flights</button>
        <button class="stab" data-tab="ships">Ships</button>
        <button class="stab" data-tab="signals">RE Signals</button>
      </div>
      <div class="sidebar__content" id="sidebar-content" style="transition: opacity 100ms ease-out"></div>
      <div class="sidebar__footer" id="sidebar-footer" style="display:none">
        Powered by <span class="brand">Felicity Intelligence</span>
      </div>
    </aside>
  </main>

  <!-- ═══════════════ STATUS BAR ═══════════════ -->
  <footer class="statusbar">
    <div class="statusbar__left">
      <span><span class="statusbar__dot"></span><span class="statusbar__label">LIVE SIMULATION</span></span>
    </div>
    <div class="statusbar__center">
      <span class="statusbar__label" id="fcount">&mdash; flights</span>
      <span class="statusbar__sep">&middot;</span>
      <span class="statusbar__label" id="scount">&mdash; vessels</span>
      <span class="statusbar__sep">&middot;</span>
      <span class="statusbar__label" id="ccount">&mdash; conflicts</span>
      <span class="statusbar__sep">&middot;</span>
      <span class="statusbar__label" id="ctrycount">&mdash; countries</span>
    </div>
    <div class="statusbar__right">
      <span class="statusbar__brand">Felicity Properties</span>
    </div>
  </footer>

  <!-- ═══════════════ MODAL ═══════════════ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title"></h2>
        <button class="modal__close" id="modal-close">&times;</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- App JS (ES Module) -->
<script type="module" src="js/app.js"></script>

</body>
</html>
